services:

  # ================================================================
  #  BASES DE DATOS
  # ================================================================

  postgres:
    image: postgres:16
    container_name: bancario-postgres
    restart: always
    environment:
      POSTGRES_DB: sistema_bancario
      POSTGRES_USER: bancario_user
      POSTGRES_PASSWORD: bancario_pass
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bancario-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ================================================================
  #  AUTH-SERVICE (PostgreSQL + JWT + Cloudinary + Email)
  # ================================================================

  auth-service:
    build:
      context: ./Backend-SistemaBancario
      dockerfile: Auth-Service/Dockerfile
    container_name: bancario-auth
    restart: always
    ports:
      - "3005:3005"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "aws-0-us-east-1.pooler.supabase.com:44.216.29.125"
    environment:
      NODE_ENV: development
      PORT: 3005
    networks:
      - bancario-network

  # ================================================================
  #  ACCOUNT-MANAGEMENT-SERVICE (MongoDB + Cuentas + Monedas)
  # ================================================================

  account-service:
    build:
      context: ./Backend-SistemaBancario
      dockerfile: Account-Management-Service/Dockerfile
    container_name: bancario-accounts
    restart: always
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: development
      PORT: 3008
    networks:
      - bancario-network

  # ================================================================
  #  TRANSACTION-PROCESSING-SERVICE (MongoDB + Depósitos/Retiros)
  # ================================================================

  transaction-service:
    build:
      context: ./Backend-SistemaBancario
      dockerfile: Transaction-Processing-Service/Dockerfile
    container_name: bancario-transactions
    restart: always
    ports:
      - "3011:3011"
    environment:
      NODE_ENV: development
      PORT: 3011
    networks:
      - bancario-network

  # ================================================================
  #  PRODUCT-MANAGEMENT-SERVICE (MongoDB + Tarjetas + Préstamos)
  # ================================================================

  product-service:
    build:
      context: ./Backend-SistemaBancario
      dockerfile: Product-Management-Service/Dockerfile
    container_name: bancario-products
    restart: always
    ports:
      - "3009:3009"
    environment:
      NODE_ENV: development
      PORT: 3009
    networks:
      - bancario-network

  # ================================================================
  #  REPORTING-ANALYTICS-SERVICE (MongoDB + PDFs + Reportes)
  # ================================================================

  reporting-service:
    build:
      context: ./Backend-SistemaBancario
      dockerfile: Reporting-Analytics-Service/Dockerfile
    container_name: bancario-reporting
    restart: always
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
      PORT: 3010
    networks:
      - bancario-network

  # ================================================================
  #  FRONTEND (React + Vite build servido por Nginx)
  # ================================================================

  frontend:
    build:
      context: "./Frontend SistemaBancario"
      args:
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL}
        VITE_ACCOUNT_SERVICE_URL: ${VITE_ACCOUNT_SERVICE_URL}
        VITE_TRANSACTION_SERVICE_URL: ${VITE_TRANSACTION_SERVICE_URL}
        VITE_PRODUCT_SERVICE_URL: ${VITE_PRODUCT_SERVICE_URL}
        VITE_REPORTING_SERVICE_URL: ${VITE_REPORTING_SERVICE_URL}
    container_name: bancario-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - account-service
      - transaction-service
      - product-service
      - reporting-service
    networks:
      - bancario-network
  # ================================================================
  #  VOLÚMENES
  # ================================================================

volumes:
  postgres_data:
    name: bancario_postgres_data
  # ================================================================
  #  RED
  # ================================================================

networks:
  bancario-network:
    name: bancario-network
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: 2001:db8:2::/64
