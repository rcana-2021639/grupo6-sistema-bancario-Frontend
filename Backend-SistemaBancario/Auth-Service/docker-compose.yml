version: "3.9"

services:
    postgres:
      image: postgres:16
      container_name: authServiceBancario
      restart: always
      environment:
        POSTGRES_DB: SistemaBancarioIN6BM
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: admin
      ports:
        - "5436:5432"
      volumes:
        - postgres_data:/var/lib/postgressql/data

volumes:
  postgres_data: